# GitHub Actions: 编译 multi_thread_tool.py → Windows .exe
name: Build EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Wine + Python
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine wine64 wine32 xvfb wget unzip 2>&1 | tail -3
          wine wineboot --init 2>&1 | tail -2

      - name: Install Python (embeddable) + pip
        run: |
          wget -q https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip
          mkdir -p /wine/drive_c/Python311
          unzip -q python-3.11.9-embed-amd64.zip -d /wine/drive_c/Python311
          rm python-3.11.9-embed-amd64.zip
          sed -i 's/^#import site/import site/' /wine/drive_c/Python311/python311._pth
          wget -q https://bootstrap.pypa.io/get-pip.py
          Xvfb :99 -screen 0 1024x768x16 &>/dev/null &
          sleep 1
          DISPLAY=:99 wine /wine/drive_c/Python311/python.exe get-pip.py
          rm get-pip.py

      - name: Install PyPI dependencies
        run: |
          DISPLAY=:99 wine /wine/drive_c/Python311/python.exe -m pip install \
            pyinstaller==6.11.1 \
            PyQt5==5.15.11 \
            pyqt5-sip==12.17.0 \
            requests==2.32.3 \
            openpyxl==3.1.5 \
            xlrd==2.0.1 \
            qrcode==8.0 \
            Pillow==11.1.0

      - name: Compile to .exe
        run: |
          DISPLAY=:99 wine /wine/drive_c/Python311/Scripts/pyinstaller.exe \
            --onefile \
            --windowed \
            --name "multi_thread_tool" \
            --hidden-import PyQt5.sip \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import requests \
            --hidden-import openpyxl \
            --hidden-import xlrd \
            --hidden-import qrcode \
            --hidden-import PIL \
            --collect-all PyQt5 \
            --noconfirm \
            multi_thread_tool.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi_thread_tool
          path: dist/multi_thread_tool.exe
