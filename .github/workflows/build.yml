name: Build EXE

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 requests beautifulsoup4 qrcode pillow pyinstaller
          pip install pywin32  # Windows 专用，PyInstaller 需要

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "模糊导入工具" fuzzy_import_tool.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 模糊导入工具
          path: dist/模糊导入工具.exe
